    name: Encompass Developer Connect API
    description: >-
      Encompass Developer Connect exposes REST APIs for managing Encompass loan files, loan pipelines, milestones,
      contacts, documents, and product and pricing data. Operations include creating, retrieving, updating, and deleting
      loans, searching the loan pipeline, and orchestrating loan workflow milestones programmatically.
