aid: encompass-developer-connect
name: Encompass Developer Connect
description: >-
  Encompass Developer Connect is the ICE Mortgage Technology REST API
  platform that allows developers to configure, customize, and administer
  loan information and resources programmatically. It covers loan
  manufacturing, loan pipeline, product and pricing, compliance,
  documents and eFolder, loan data extracts, and loan folders. Access
  is authenticated via OAuth 2.0 with support for user impersonation,
  ISV partner API users, and federated SAML SSO.
